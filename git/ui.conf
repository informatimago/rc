[core]
    pager = delta

[color]
    ui = auto
	diff = auto

[delta]
    # Declare a dark (green-on-black) background so delta does NOT query the
    # terminal with OSC 10/11 "?" sequences. The query is skipped whenever
    # `dark` or `light` is set, which keeps emacs M-x shell (no terminal
    # emulator) from showing the raw ]10;? ]11;? escapes.
    dark = true
    # Belt-and-suspenders: never probe even if `dark` is ever removed.
    detect-dark-light = never

